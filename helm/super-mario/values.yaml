namespace: super-mario

replicaCount: 1

image:
  repository: asia-south1-docker.pkg.dev/super-mario-devops/super-mario-repo/super-mario
  tag: v1

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"

  limits:
    cpu: "250m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
